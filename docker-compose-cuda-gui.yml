services:
  pyannote_whisper:
    build:
      context: .
      dockerfile: Dockerfile-cuda
    image: pyannote-whisper-cuda
    runtime: nvidia
    environment:
      HF_TOKEN: "your-token-here"
      HF_HOME: "/workspace/models/"
      DISPLAY: ${DISPLAY}
    command: /workspace/startup.sh
    network_mode: host
    ipc: host
    pid: host
    restart: always
    volumes:
      - type: bind
        source: ./workspace
        target: /workspace
      - type: bind
        source: ./pyannote_whisper
        target: /workspace/pyannote_whisper
      - type: bind
        source: ./data
        target: /workspace/data
      - type: bind
        source: /tmp/.X11-unix
        target: /tmp/.X11-unix
