services:
  pyannote_whisper:
    build:
      context: .
      dockerfile: Dockerfile-cuda
    image: pyannote-whisper-cuda
    runtime: nvidia
    environment:
      HF_TOKEN: "your-token-here"
      HF_HOME: "/workspace/models/"
      PYTHONUNBUFFERED: 1
    command: /workspace/startup.sh
    network_mode: host
    ipc: host
    pid: host
    restart: always
    volumes:
      - type: bind
        source: ./workspace
        target: /workspace
      - type: bind
        source: .
        target: /pyannote_whisper
